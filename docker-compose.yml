services:
  heartmula:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: heartmula-studio

    # GPU access - NVIDIA Container Toolkit (Docker Desktop WSL2)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    ports:
      - "8000:8000"

    # Ollama için host erişimi
    extra_hosts:
      - "host.docker.internal:host-gateway"

    volumes:
      # Backend kodu (geliştirme için mount)
      - ./backend:/app/backend
      # Kalıcı veriler zaten backend/ altında

    environment:
      - CUDA_VISIBLE_DEVICES=0
      # RTX 5080 16GB - 4bit açık, offload kapalı (hızlı)
      - HEARTMULA_4BIT=true
      - HEARTMULA_SEQUENTIAL_OFFLOAD=false
      - PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
      - HF_HOME=/app/backend/models
      - HEARTMULA_DB_PATH=/app/backend/db/jobs.db
      - OLLAMA_HOST=http://host.docker.internal:11434
      - HF_TOKEN=${HF_TOKEN:-}
      - CUSTOM_API_BASE_URL=${CUSTOM_API_BASE_URL:-https://api.openai.com/v1}
      - CUSTOM_API_KEY=${CUSTOM_API_KEY:-}
      - CUSTOM_API_MODEL=${CUSTOM_API_MODEL:-gpt-4o-mini}
      # Auth & SMTP (Brevo)
      - SMTP_HOST=${SMTP_HOST:-smtp-relay.brevo.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-info@telekomone.net}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-cmutlu2006@hotmail.com}
      - APP_URL=http://localhost:8000
      - JWT_SECRET=${JWT_SECRET:-}

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
